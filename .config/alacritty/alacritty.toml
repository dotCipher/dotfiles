# Alacritty configuration (TOML format, required since v0.13+)

[env]
TERM = "xterm-256color"

[window]
opacity = 0.95
title = "Alacritty"
dynamic_title = true

[window.padding]
x = 2
y = 2

[scrolling]
history = 5000
multiplier = 5

[font]
size = 14.0
builtin_box_drawing = true

[font.normal]
family = "Hack Nerd Font"
style = "Regular"

[font.bold]
family = "Hack Nerd Font"
style = "Bold"

[font.italic]
family = "Hack Nerd Font"
style = "Italic"

[font.bold_italic]
family = "Hack Nerd Font"
style = "Bold Italic"

# Solarized Dark
[colors.primary]
background = "#002b36"
foreground = "#93a1a1"

[colors.cursor]
text = "#002b36"
cursor = "#93a1a1"

[colors.normal]
black = "#002b36"
red = "#dc322f"
green = "#859900"
yellow = "#b58900"
blue = "#268bd2"
magenta = "#6c71c4"
cyan = "#2aa198"
white = "#93a1a1"

[colors.bright]
black = "#657b83"
red = "#dc322f"
green = "#859900"
yellow = "#b58900"
blue = "#268bd2"
magenta = "#6c71c4"
cyan = "#2aa198"
white = "#fdf6e3"

[[colors.indexed_colors]]
index = 16
color = "#cb4b16"

[[colors.indexed_colors]]
index = 17
color = "#d33682"

[[colors.indexed_colors]]
index = 18
color = "#073642"

[[colors.indexed_colors]]
index = 19
color = "#586e75"

[[colors.indexed_colors]]
index = 20
color = "#839496"

[[colors.indexed_colors]]
index = 21
color = "#eee8d5"

[shell]
program = "/opt/homebrew/bin/fish"
args = ["--login"]
