# Starship config — Infinity Constellation
# Optimized for infra / AI / software engineering
# https://starship.rs/config/

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_metrics\
$git_state\
$terraform\
$kubernetes\
$aws\
$gcloud\
$docker_context\
$python\
$golang\
$rust\
$nodejs\
$package\
$fill\
$cmd_duration\
$jobs\
$time\
$line_break\
$character"""

# Two-line prompt with right-aligned status info
right_format = ""

[fill]
symbol = " "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[os]
disabled = true

[username]
style_user = "bold cyan"
style_root = "bold red"
format = "[$user]($style)@"
disabled = true
show_always = false

[hostname]
ssh_only = true
format = "[$hostname](bold yellow) "
disabled = false

[directory]
style = "bold blue"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 4
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "red"

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "bold purple"
truncation_length = 24

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold yellow"
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = "?${count}"
stashed = " "
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold yellow"

[terraform]
format = "[ tf:$workspace]($style) "
style = "bold 105"
disabled = false

[kubernetes]
format = '[󱃾 $context\($namespace\)]($style) '
style = "bold cyan"
disabled = false

[[kubernetes.contexts]]
context_pattern = 'arn:aws:eks:.*:.*:cluster/(.*)'
context_alias = '$1'

[[kubernetes.contexts]]
context_pattern = '.*/(.*)$'
context_alias = '$1'

[aws]
format = '[ $profile($region)]($style) '
style = "bold 208"
disabled = false
force_display = false

[aws.region_aliases]
us-east-1 = "ue1"
us-east-2 = "ue2"
us-west-1 = "uw1"
us-west-2 = "uw2"
eu-west-1 = "ew1"
eu-central-1 = "ec1"
ap-southeast-1 = "aps1"

[gcloud]
format = '[ $account(@$domain)(\($region\))]($style) '
style = "bold 27"
disabled = false

[docker_context]
format = "[ $context]($style) "
style = "bold blue"
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

[python]
format = '[ ${pyenv_prefix}${version}( \($virtualenv\))]($style) '
style = "bold yellow"
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "Pipfile", "setup.py", "setup.cfg"]
detect_folders = [".venv", "venv", "__pycache__"]

[golang]
format = "[ $version]($style) "
style = "bold cyan"
detect_files = ["go.mod", "go.sum", "go.work"]

[rust]
format = "[ $version]($style) "
style = "bold 208"
detect_files = ["Cargo.toml"]

[nodejs]
format = "[ $version]($style) "
style = "bold green"
detect_files = ["package.json", ".nvmrc"]
detect_folders = ["node_modules"]
not_capable_style = "bold red"

[package]
format = "[$symbol$version]($style) "
symbol = "󰏗 "
style = "bold 208"
disabled = true

[git_metrics]
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
added_style = "bold green"
deleted_style = "bold red"
disabled = false

[cmd_duration]
format = "[ $duration]($style)"
style = "bold yellow"
min_time = 1000
show_milliseconds = false

[jobs]
format = "[$symbol$number]($style) "
symbol = "󰒿 "
style = "bold blue"
number_threshold = 1

[time]
format = "[$time]($style) "
style = "dimmed white"
time_format = "%H:%M"
disabled = false
