set-option -g default-shell /opt/homebrew/bin/fish
set -g mouse on

# Performance optimizations for long sessions
# Reduce scrollback history to prevent memory/rendering issues
set-option -g history-limit 5000

# Increase display time for messages (optional, for better UX)
set-option -g display-time 2000

# Enable 256 color support
set -g default-terminal "screen-256color"

# Enable RGB color if the terminal supports it
set -ga terminal-overrides ",xterm-256color:Tc"

# Reduce escape time for better responsiveness
set -sg escape-time 10

# Increase repeat time for repeated commands
set -g repeat-time 600

# Enable focus events for better terminal integration
set -g focus-events on
